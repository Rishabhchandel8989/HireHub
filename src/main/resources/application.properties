# =============================================
#  HireHub - Application Configuration
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# ── Database ──────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hirehub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────
# 256-bit secret key (Base64 encoded)
jwt.secret=aGlyZWh1Yl9zdXBlcl9zZWNyZXRfa2V5XzI1NmJpdHNfZm9yX0hTMjU2X2p3dF9zaWduaW5n
jwt.expiration.ms=86400000

# ── Jackson ────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL

# ── Logging ────────────────────────────────────
logging.level.com.hirehub=DEBUG
logging.level.org.springframework.security=INFO
